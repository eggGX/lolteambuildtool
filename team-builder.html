<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>構成新規作成</title>
<style>
* { box-sizing: border-box; }
html, body {
  height: 100%;
}
body {
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}
.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 20px;
  border-bottom: 1px solid #334155;
  flex-wrap: wrap;
}
.header h1 { margin: 0; }
.nav {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.nav a {
  background: #1e293b;
  color: #e5e7eb;
  text-decoration: none;
  padding: 10px 14px;
  border: 1px solid #334155;
  border-radius: 8px;
}
.nav a:hover { background: #334155; }
.main {
  flex: 1;
  min-height: 0;
  display: flex;
  overflow: hidden;
}
.left {
  width: 40%;
  min-width: 320px;
  height: 100%;
  padding: 20px;
  border-right: 2px solid #334155;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}
.lane {
  height: 244px;
  min-height: 244px;
  max-height: 244px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 48px 10px 14px;
  border: 2px solid #d4af37;
  cursor: pointer;
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;
  flex: 0 0 244px;
}
.lane.selected {
  background: #334155;
  box-shadow: 0 0 0 2px rgba(212,175,55,0.35) inset;
}
.lane img {
  height: 100%;
  width: auto;
  max-height: 100%;
  object-fit: contain;
  border-radius: 10px;
}
.lane-main {
  flex: 1;
  min-width: 0;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.alt-area {
  width: 58px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 4px;
  flex-shrink: 0;
}
.alt-area img {
  width: 100%;
  height: calc((100% - 8px) / 3);
  object-fit: cover;
  border-radius: 8px;
}
.alt-slot-empty {
  width: 100%;
  height: calc((100% - 8px) / 3);
  border: 1px dashed #64748b;
  border-radius: 8px;
  opacity: 0.45;
}
.alt-btn {
  position:absolute;
  right:8px;
  bottom:8px;
  width:30px;
  height:30px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#d4af37;
  color:#111827;
  border:none;
  cursor:pointer;
  border-radius:999px;
  font-weight:bold;
  z-index: 50;
  pointer-events: auto;
}
.lane span {
  font-size: 18px;
  word-break: break-word;
}
.panel-view {
  display: flex;
  flex-direction: column;
  gap: 20px;
  height: max-content;
  min-height: max-content;
  overflow-y: visible;
  flex: 0 0 auto;
}
.panel-view.hidden {
  display: none;
}
.ban-header {
  font-size: 20px;
  font-weight: bold;
  color: #d4af37;
  text-align: center;
  padding: 8px 0;
}
.ban-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
}
.ban-slot {
  min-height: 180px;
  border: 2px solid #d4af37;
  border-radius: 12px;
  background: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ban-slot img {
  max-height: 100%;
  height: 244px;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  border-radius: 10px;
}
.ban-slot.empty-slot {
  color: #94a3b8;
  font-size: 18px;
}
.right {
  flex: 1;
  min-width: 0;
  height: 100%;
  padding: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.top-actions {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.action-button {
  padding: 10px 14px;
  background: #d4af37;
  color: #111827;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}
.action-button.secondary {
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
}
.search-box {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  background: #111827;
  border: 1px solid #334155;
  color: white;
  border-radius: 8px;
}
.tag-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.tag-filter {
  width: auto;
  padding: 8px 12px;
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
  border-radius: 8px;
  cursor: pointer;
}
.tag-filter.active {
  background: #d4af37;
  color: #111827;
  border-color: #d4af37;
}
.champion-list-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 6px;
}
.champion-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, 100px);
  gap: 15px;
  align-content: start;
}
.champion {
  text-align: center;
  cursor: pointer;
  background: #1e293b;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #334155;
}
.champion img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}
.champion:hover { transform: scale(1.05); }
.meta-summary {
  margin-top: 10px;
  padding: 12px;
  background: #111827;
  border: 1px solid #334155;
  border-radius: 10px;
  flex-shrink: 0;
}
.meta-summary strong { color: #d4af37; }
.empty {
  color: #94a3b8;
      padding: 20px 0;
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(2, 6, 23, 0.7);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 9999;
}
.modal-backdrop.open { display: flex; }
.modal {
  width: min(520px, 100%);
  background: #111827;
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  position: relative;
  z-index: 10000;
}
.modal h2 { margin-top: 0; }
.modal input, .modal textarea {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  background: #1e293b;
  border: 1px solid #334155;
  color: white;
  border-radius: 8px;
}
.modal textarea {
  min-height: 140px;
  resize: vertical;
}
.modal-actions {
  display: flex;
  gap: 20px;
  justify-content: flex-end;
}
.modal-actions button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
.save-btn {
  background: #d4af37;
  color: #111827;
  font-weight: bold;
}
.cancel-btn {
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>構成新規作成</h1>
    <div class="nav">
      <a href="champion.html?v=53">チャンピオン登録</a>
      <a href="team-builder.html?v=53">構成新規作成</a>
      <a href="index.html?v=53">構成一覧</a>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <div id="capture" class="panel-view">
        <div class="lane" data-lane="top">
  <div class="lane-main"></div>
  <div class="alt-area" data-alt="top"></div>
  <button type="button" class="alt-btn" data-lane="top" onclick="handleAltButtonClick(event, 'top')">＋</button>
</div>
        <div class="lane" data-lane="jg">
  <div class="lane-main"></div>
  <div class="alt-area" data-alt="jg"></div>
  <button type="button" class="alt-btn" data-lane="jg" onclick="handleAltButtonClick(event, 'jg')">＋</button>
</div>
        <div class="lane" data-lane="mid">
  <div class="lane-main"></div>
  <div class="alt-area" data-alt="mid"></div>
  <button type="button" class="alt-btn" data-lane="mid" onclick="handleAltButtonClick(event, 'mid')">＋</button>
</div>
        <div class="lane" data-lane="adc">
  <div class="lane-main"></div>
  <div class="alt-area" data-alt="adc"></div>
  <button type="button" class="alt-btn" data-lane="adc" onclick="handleAltButtonClick(event, 'adc')">＋</button>
</div>
        <div class="lane" data-lane="sup">
  <div class="lane-main"></div>
  <div class="alt-area" data-alt="sup"></div>
  <button type="button" class="alt-btn" data-lane="sup" onclick="handleAltButtonClick(event, 'sup')">＋</button>
</div>
      </div>
      <div id="banPanel" class="panel-view hidden">
        <div class="ban-header">BAN想定チャンピオン</div>
        <div class="ban-grid" id="banSlotList"></div>
      </div>
    </div>

    <div class="right">
      <div class="top-actions">
        <button class="action-button secondary" onclick="openMetaModal()">構成名・メモ入力</button>
        <button class="action-button" onclick="saveTeam()">保存</button>
        <button class="action-button secondary" onclick="generateExportImage()">画像出力</button>
        <button class="action-button secondary" onclick="toggleBanMode()">BAN設定</button>
      </div>

      <div class="meta-summary">
        <div><strong>構成名:</strong> <span id="teamNamePreview">未設定</span></div>
        <div style="margin-top:8px;"><strong>メモ:</strong> <span id="memoPreview">未設定</span></div>
        <div id="shareNotice" style="display:none; margin-top:10px; color:#cbd5e1;">共有URLから読み込んだ構成です。保存すると通常の構成として登録されます。</div>
      </div>

      <h2 style="flex-shrink:0;">チャンピオン一覧</h2>
      <input id="searchInput" class="search-box" placeholder="チャンピオン名で検索" oninput="renderChampionList()">
      <div class="tag-filters">
        <button class="tag-filter active" data-tag="" onclick="setTagFilter('')">すべて</button>
        <button class="tag-filter" data-tag="TOP" onclick="setTagFilter('TOP')">TOP</button>
        <button class="tag-filter" data-tag="JG" onclick="setTagFilter('JG')">JG</button>
        <button class="tag-filter" data-tag="MID" onclick="setTagFilter('MID')">MID</button>
        <button class="tag-filter" data-tag="ADC" onclick="setTagFilter('ADC')">ADC</button>
        <button class="tag-filter" data-tag="SUP" onclick="setTagFilter('SUP')">SUP</button>
      </div>
      <div class="champion-list-scroll"><div class="champion-list" id="championList"></div></div>

</div>

<div class="modal-backdrop" id="metaModal">
  <div class="modal">
    <h2>構成情報入力</h2>
    <input id="teamName" placeholder="構成名">
    <textarea id="memo" placeholder="メモ"></textarea>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeMetaModal()">閉じる</button>
      <button class="save-btn" onclick="applyMeta()">反映</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">


</script>
<script src="db.js">


</script>
<script>
const lanes = ["top", "jg", "mid", "adc", "sup"];
let selectedLane = null;

let altModeLane = null;

function handleAltButtonClick(event, lane) {
  event.preventDefault();
  event.stopPropagation();
  selectAltMode(lane);
}

function selectAltMode(lane){
  altModeLane = (altModeLane === lane ? null : lane);
  refreshAltButtons();
}


function refreshAltButtons() {
  document.querySelectorAll(".alt-btn").forEach(btn => {
    const lane = btn.dataset.lane;
    btn.style.outline = altModeLane === lane ? "2px solid #ffffff" : "none";
  });
}

function clearAltMode() {
  altModeLane = null;
  refreshAltButtons();
}


let team = {};
let champions = [];
let activeTagFilter = "";
let bannedChampionIds = [];
let isBanMode = false;
let altPicks = {};

document.querySelectorAll(".lane").forEach(el => {
  el.onclick = (event) => {
    if (event.target.closest(".alt-btn")) return;
    clearAltMode();
    document.querySelectorAll(".lane").forEach(l => l.classList.remove("selected"));
    el.classList.add("selected");
    selectedLane = el.dataset.lane;
  };

  el.ondragover = (e) => e.preventDefault();
  el.ondrop = (e) => {
    const id = e.dataTransfer.getData("id");
    team[el.dataset.lane] = id;
    renderTeam();
  renderAlt();
  refreshAltButtons();
  };
});



function toggleBanMode() {
  clearAltMode();
  isBanMode = !isBanMode;
  document.getElementById("capture").classList.toggle("hidden", isBanMode);
  document.getElementById("banPanel").classList.toggle("hidden", !isBanMode);
  renderBanSlots();
}

function renderBanSlots() {
  const wrap = document.getElementById("banSlotList");
  if (!wrap) return;
  wrap.innerHTML = "";

  const ids = bannedChampionIds.slice(0, 10);

  if (ids.length === 0) {
    for (let i = 0; i < 4; i++) {
      const empty = document.createElement("div");
      empty.className = "ban-slot empty-slot";
      empty.textContent = "BAN未設定";
      wrap.appendChild(empty);
    }
    return;
  }

  ids.forEach(id => {
    const champ = champions.find(c => c.id === id);
    const slot = document.createElement("div");
    slot.className = "ban-slot";

    if (champ) {
      slot.innerHTML = `<img src="${champ.image}" alt="">`;
    } else {
      slot.classList.add("empty-slot");
      slot.textContent = "不明";
    }

    wrap.appendChild(slot);
  });
}






function resetTeamBuilderState() {
  team = {};
  bannedChampionIds = [];
  altPicks = {};
  selectedLane = null;
  altModeLane = null;
  isBanMode = false;

  document.querySelectorAll(".lane").forEach(l => l.classList.remove("selected"));
  document.getElementById("capture").classList.remove("hidden");
  document.getElementById("banPanel").classList.add("hidden");

  const teamNameEl = document.getElementById("teamName");
  const memoEl = document.getElementById("memo");
  if (teamNameEl) teamNameEl.value = "";
  if (memoEl) memoEl.value = "";

  const teamNamePreview = document.getElementById("teamNamePreview");
  const memoPreview = document.getElementById("memoPreview");
  if (teamNamePreview) teamNamePreview.textContent = "未設定";
  if (memoPreview) memoPreview.textContent = "未設定";

  const searchInput = document.getElementById("searchInput");
  if (searchInput) searchInput.value = "";

  activeTagFilter = "";
  document.querySelectorAll(".tag-filter").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tag === "");
  });

  const metaModal = document.getElementById("metaModal");
  if (metaModal) metaModal.classList.remove("open");

  renderTeam();
  renderAlt();
  renderBanSlots();
  refreshAltButtons();
  renderChampionList();
}


function readSharePayloadFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get("share");
  if (!encoded) return null;

  try {
    const json = decodeURIComponent(escape(atob(decodeURIComponent(encoded))));
    return JSON.parse(json);
  } catch (error) {
    console.error(error);
    return null;
  }
}

function findChampionIdByName(name) {
  if (!name) return "";
  const champ = champions.find(c => c.name === name);
  return champ ? champ.id : "";
}

async function loadSharedTeamFromUrl() {
  const payload = readSharePayloadFromUrl();
  if (!payload || !payload.team) return false;

  resetTeamBuilderState();

  const shared = payload.team;
  const teamNameEl = document.getElementById("teamName");
  const memoEl = document.getElementById("memo");
  if (teamNameEl) teamNameEl.value = shared.name || "";
  if (memoEl) memoEl.value = shared.memo || "";
  applyMeta();

  team = {};
  Object.entries(shared.lanes || {}).forEach(([lane, name]) => {
    team[lane] = findChampionIdByName(name);
  });

  bannedChampionIds = (shared.bans || [])
    .map(name => findChampionIdByName(name))
    .filter(Boolean);

  altPicks = {};
  Object.entries(shared.altPicks || {}).forEach(([lane, list]) => {
    altPicks[lane] = (list || [])
      .map(name => findChampionIdByName(name))
      .filter(Boolean)
      .slice(0, 3);
  });

  renderTeam();
  renderAlt();
  renderBanSlots();
  refreshAltButtons();
  renderChampionList();

  const shareNotice = document.getElementById("shareNotice");
  if (shareNotice) shareNotice.style.display = "block";

  return true;
}

function openMetaModal() {
  clearAltMode();
  document.getElementById("metaModal").classList.add("open");
}

function closeMetaModal() {
  document.getElementById("metaModal").classList.remove("open");
}

function applyMeta() {
  const name = document.getElementById("teamName").value.trim();
  const memo = document.getElementById("memo").value.trim();
  document.getElementById("teamNamePreview").textContent = name || "未設定";
  document.getElementById("memoPreview").textContent = memo || "未設定";
  closeMetaModal();
}

function setTagFilter(tag) {
  activeTagFilter = tag;
  document.querySelectorAll(".tag-filter").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tag === tag);
  });
  renderChampionList();
}


async function ensureInitialChampionSeed() {
  try {
    const existing = await getChampionList();
    if (existing.length > 0) return;

    const response = await fetch("champions.json", { cache: "no-store" });
    if (!response.ok) return;

    const payload = await response.json();
    if (!payload || !Array.isArray(payload.champions)) return;

    const champions = payload.champions.map(ch => ({
      ...ch,
      tags: Array.isArray(ch.tags) ? ch.tags : []
    }));

    if (champions.length > 0) {
      await saveManyChampions(champions);
    }
  } catch (error) {
    console.error(error);
  }
}

async function loadChampions() {
  champions = await getChampionList();
  renderChampionList();
}

function renderChampionList() {
  const list = document.getElementById("championList");
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  list.innerHTML = "";

  const filtered = champions
    .filter(c => c.name.toLowerCase().includes(keyword))
    .filter(c => {
      if (!activeTagFilter) return true;
      return Array.isArray(c.tags) && c.tags.includes(activeTagFilter);
    })
    .sort((a, b) => a.name.localeCompare(b.name, "ja"));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当するチャンピオンがありません。</div>';
    return;
  }

  filtered.forEach(c => {
    const div = document.createElement("div");
    div.className = "champion";
    div.draggable = true;
    div.innerHTML = `<img src="${c.image}" alt=""><div>${c.name}</div>`;

    div.onclick = () => {
      if (isBanMode) {
        if (bannedChampionIds.includes(c.id)) {
          bannedChampionIds = bannedChampionIds.filter(id => id !== c.id);
        } else {
          if (bannedChampionIds.length < 10) {
          bannedChampionIds.push(c.id);
        }
        }
        renderBanSlots();
        return;
      }

      if (altModeLane) {
        altPicks[altModeLane] = altPicks[altModeLane] || [];
        if (altPicks[altModeLane].includes(c.id)) {
          altPicks[altModeLane] = altPicks[altModeLane].filter(id=>id!==c.id);
        } else if (altPicks[altModeLane].length < 3) {
          altPicks[altModeLane].push(c.id);
        }
        renderAlt();
        refreshAltButtons();
        return;
      }

      if (!selectedLane) return;
      team[selectedLane] = c.id;
      renderTeam();
  renderAlt();
  refreshAltButtons();
    };

    div.ondragstart = (e) => {
      e.dataTransfer.setData("id", c.id);
    };

    list.appendChild(div);
  });
}


function renderAlt(){
  document.querySelectorAll(".alt-area").forEach(el => {
    const lane = el.dataset.alt;
    el.innerHTML = "";
    const list = (altPicks[lane] || []).slice(0, 3);

    list.forEach(id => {
      const champ = champions.find(c => c.id === id);
      if (!champ) return;
      const img = document.createElement("img");
      img.src = champ.image;
      img.alt = "";
      img.title = champ.name;
      img.onclick = (event) => {
        event.stopPropagation();
        altPicks[lane] = (altPicks[lane] || []).filter(x => x !== id);
        renderAlt();
      };
      el.appendChild(img);
    });

    for (let i = list.length; i < 3; i++) {
      const empty = document.createElement("div");
      empty.className = "alt-slot-empty";
      el.appendChild(empty);
    }
  });
}

function renderTeam() {
  lanes.forEach(lane => {
    const laneEl = document.querySelector(`[data-lane="${lane}"]`);
    const el = laneEl.querySelector(".lane-main");
    const champ = champions.find(c => c.id === team[lane]);

    if (champ) {
      el.innerHTML = `<img src="${champ.image}" alt="">`;
    } else {
      el.innerHTML = `<span style="margin:auto;font-size:18px;">${lane.toUpperCase()}</span>`;
    }
  });
}

async function saveTeam() {
  const payload = {
    id: crypto.randomUUID(),
    name: document.getElementById("teamName").value.trim(),
    memo: document.getElementById("memo").value.trim(),
    lanes: team,
    bans: bannedChampionIds,
    altPicks: altPicks
  };

  await saveTeamData(payload);
  alert("保存しました");
}

function exportImage() {
  html2canvas(document.getElementById("capture")).then(canvas => {
    const link = document.createElement("a");
    link.download = "team.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

async function loadEditingTeam() {
  const editingId = sessionStorage.getItem("editingTeamId");
  if (!editingId) return;

  const t = await getTeamById(editingId);
  if (!t) return;

  team = t.lanes || {};
  bannedChampionIds = t.bans || [];
  altPicks = t.altPicks || {};
  document.getElementById("teamName").value = t.name || "";
  document.getElementById("memo").value = t.memo || "";
  applyMeta();
}

(async function init() {
  await ensureInitialChampionSeed();
  await loadChampions();
  resetTeamBuilderState();
  await loadSharedTeamFromUrl();
})();







function buildExportMainCard(src, role) {
  const box = document.createElement("div");
  box.style.width = "210px";
  box.style.height = "236px";
  box.style.borderRadius = "22px";
  box.style.overflow = "hidden";
  box.style.position = "relative";
  box.style.background = "linear-gradient(180deg, #334155, #1e293b)";
  box.style.boxShadow = "0 12px 28px rgba(0,0,0,0.45)";
  box.style.border = "2px solid rgba(250, 204, 21, 0.7)";
  box.style.flexShrink = "0";

  if (src) {
    const img = document.createElement("img");
    img.src = src;
    img.alt = "";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    box.appendChild(img);
  }

  const label = document.createElement("div");
  label.textContent = role;
  label.style.position = "absolute";
  label.style.left = "10px";
  label.style.top = "10px";
  label.style.padding = "6px 10px";
  label.style.borderRadius = "999px";
  label.style.background = "rgba(15, 23, 42, 0.86)";
  label.style.border = "1px solid rgba(250, 204, 21, 0.65)";
  label.style.fontSize = "15px";
  label.style.fontWeight = "700";
  label.style.letterSpacing = "0.5px";
  label.style.color = "#f8fafc";
  box.appendChild(label);

  return box;
}

function generateExportImage() {
  const exportArea = document.getElementById("exportArea");
  const exportMain = document.getElementById("exportMain");
  const exportSub = document.getElementById("exportSub");
  const exportBan = document.getElementById("exportBan");
  const exportNameBar = document.getElementById("exportNameBar");

  exportMain.innerHTML = "";
  exportSub.innerHTML = "";
  exportBan.innerHTML = "";

  const teamName = (document.getElementById("teamName")?.value || "").trim();
  exportNameBar.textContent = teamName || "構成";

  const laneLabels = {
    top: "TOP",
    jg: "JG",
    mid: "MID",
    adc: "ADC",
    sup: "SUP"
  };

  ["top", "jg", "mid", "adc", "sup"].forEach(lane => {
    const champ = champions.find(c => c.id === team[lane]);
    exportMain.appendChild(
      buildExportMainCard(champ ? champ.image : "", laneLabels[lane])
    );

    const subWrap = document.createElement("div");
    subWrap.style.width = "210px";
    subWrap.style.display = "flex";
    subWrap.style.gap = "8px";
    subWrap.style.justifyContent = "center";

    const subs = (altPicks[lane] || []).slice(0, 3);
    for (let i = 0; i < 3; i++) {
      const subChamp = champions.find(c => c.id === subs[i]);
      subWrap.appendChild(buildExportSubCard(subChamp ? subChamp.image : ""));
    }
    exportSub.appendChild(subWrap);
  });

  const bans = bannedChampionIds.slice(0, 10);
  for (let i = 0; i < 10; i++) {
    const banChamp = champions.find(c => c.id === bans[i]);
    exportBan.appendChild(buildExportBanCard(banChamp ? banChamp.image : ""));
  }

  html2canvas(exportArea, {
    backgroundColor: null,
    useCORS: true,
    scale: 2
  }).then(canvas => {
    canvas.toBlob((blob) => {
      if (!blob) {
        alert("画像出力に失敗しました");
        return;
      }
      const link = document.createElement("a");
      const safeName = teamName ? `${teamName}.png` : "チーム構成.png";
      link.download = safeName;
      link.href = URL.createObjectURL(blob);
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }, "image/png");
  }).catch((err) => {
    console.error(err);
    alert("画像出力に失敗しました");
  });
}

</script>
