<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャンピオン登録</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1, h2 { margin: 0; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav a, .nav .nav-btn {
      background: #1e293b;
      color: #e5e7eb;
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      width: auto;
      font: inherit;
      font-weight: 600;
      white-space: nowrap;
    }
    .nav a:hover, .nav .nav-btn:hover { background: #334155; }
    .container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }
    .form-area {
      width: 320px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      position: sticky;
      top: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }
    button:hover { opacity: 0.85; }
    #paste-area {
      border: 2px dashed #64748b;
      padding: 20px;
      text-align: center;
      margin-bottom: 15px;
      background: #1e293b;
      border-radius: 10px;
      min-height: 180px;
    }
    #preview {
      max-width: 100%;
      max-height: 220px;
      margin-top: 10px;
      border-radius: 8px;
    }
    .info-box {
      margin-top: 12px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      color: #cbd5e1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
    }
    .list-area { flex: 1; min-width: 0; }
    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-row input {
      margin: 0;
      max-width: 320px;
    }
    .tag-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-filter {
      width: auto;
      padding: 8px 12px;
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #334155;
    }
    .tag-filter.active {
      background: #d4af37;
      color: #111827;
      border-color: #d4af37;
    }
    .champion-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, 140px);
      gap: 15px;
    }
    .champion-card {
      background: #1e293b;
      padding: 10px;
      text-align: center;
      border: 1px solid #334155;
      border-radius: 10px;
    }
    .champion-card img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 8px;
    }
    .champion-card .name {
      margin-top: 8px;
      word-break: break-word;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .card-actions button {
      padding: 6px;
      font-size: 12px;
    }
    .edit-btn {
      background: #3b82f6;
      color: white;
    }
    .delete-btn {
      background: #ef4444;
      color: white;
    }
    .empty {
      color: #94a3b8;
      padding: 20px 0;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .modal h3 {
      margin-top: 0;
      margin-bottom: 14px;
    }
    .preview-box {
      margin-bottom: 14px;
      text-align: center;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
    }
    .preview-box img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }
    .tag-section {
      margin-bottom: 14px;
    }
    .tag-section-title {
      margin-bottom: 8px;
      color: #d4af37;
      font-weight: bold;
    }
    .tag-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 8px 12px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .modal-actions button {
      width: auto;
      padding: 10px 14px;
    }
    .secondary-btn {
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #334155;
    }

@media (max-width: 900px) {
  body {
    padding: 14px;
  }
  .header {
    align-items: flex-start;
  }
  .nav {
    width: 100%;
    gap: 8px;
  }
  .nav a, .nav .nav-btn {
    flex: 1 1 calc(50% - 8px);
    text-align: center;
    padding: 10px 12px;
    font-size: 14px;
  }
  .container {
    flex-direction: column;
    gap: 18px;
  }
  .form-area {
    width: 100%;
    position: static;
  }
  .list-area {
    width: 100%;
  }
  .toolbar {
    gap: 10px;
  }
  .search-row {
    flex-direction: column;
    align-items: stretch;
  }
  .search-row input {
    max-width: none;
    width: 100%;
  }
  .tag-filters {
    gap: 6px;
  }
  .tag-filter {
    padding: 8px 10px;
    font-size: 13px;
  }
  .champion-list {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .champion-card img {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
  }
  .modal {
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
}

  </style>
</head>
<body>
<div class="header">
  <h1>チャンピオン登録</h1>
  <div class="nav">
    <button class="nav-btn" onclick="exportChampions()">チャンピオンエクスポート</button>
    <button class="nav-btn" onclick="triggerChampionImport()">チャンピオンインポート</button>
    <a href="champion.html">チャンピオン登録</a>
    <a href="team-builder.html">新規構成</a>
    <a href="index.html">構成一覧</a>
  </div>
</div>

<div class="container">
  <div class="form-area">
    <input type="text" id="name" placeholder="チャンピオン名">
    <div id="paste-area">
      Ctrl + V で画像貼り付け
      <img id="preview" alt="">
    </div>
    <button onclick="saveChampion()">登録</button>
    <div class="info-box">
      画像は登録時に自動で縮小・圧縮します。<br>
      編集からタグ設定が可能です。<br>
      タグは TOP / JG / MID / ADC / SUP の5種類です。
    </div>
    <div id="seedStatus" class="info-box" style="display:none;"></div>
  </div>

  <div class="list-area">
    <div class="toolbar">
      <div class="search-row">
        <h2>登録済みチャンピオン</h2>
        <input id="searchInput" placeholder="チャンピオン名で検索" oninput="renderList()">
      </div>
      <div class="tag-filters">
        <button class="tag-filter active" data-tag="" onclick="setTagFilter('')">すべて</button>
        <button class="tag-filter" data-tag="TOP" onclick="setTagFilter('TOP')">TOP</button>
        <button class="tag-filter" data-tag="JG" onclick="setTagFilter('JG')">JG</button>
        <button class="tag-filter" data-tag="MID" onclick="setTagFilter('MID')">MID</button>
        <button class="tag-filter" data-tag="ADC" onclick="setTagFilter('ADC')">ADC</button>
        <button class="tag-filter" data-tag="SUP" onclick="setTagFilter('SUP')">SUP</button>
      </div>
    </div>
    <input id="championImportInput" type="file" accept=".json,application/json" style="display:none" onchange="handleChampionImport(event)">
<div id="championList" class="champion-list"></div>
  </div>
</div>

<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <h3>チャンピオン編集</h3>
    <input type="text" id="editName" placeholder="チャンピオン名">
    <div class="preview-box">
      <div style="margin-bottom:8px;">画像を差し替える場合は Ctrl + V</div>
      <img id="editPreview" alt="">
    </div>
    <div class="tag-section">
      <div class="tag-section-title">タグ設定</div>
      <div class="tag-options">
        <label class="tag-option"><input type="checkbox" value="TOP" class="tag-checkbox"> TOP</label>
        <label class="tag-option"><input type="checkbox" value="JG" class="tag-checkbox"> JG</label>
        <label class="tag-option"><input type="checkbox" value="MID" class="tag-checkbox"> MID</label>
        <label class="tag-option"><input type="checkbox" value="ADC" class="tag-checkbox"> ADC</label>
        <label class="tag-option"><input type="checkbox" value="SUP" class="tag-checkbox"> SUP</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="closeEditModal()">閉じる</button>
      <button onclick="saveEditChampion()">保存</button>
    </div>
  </div>
</div>

<script src="db.js">
function exportChampions() {
  getChampionList().then(list => {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      champions: list
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.download = "champions.json";
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  });
}

function triggerChampionImport(){
  const input = document.getElementById("championImportInput");
  input.value="";
  input.click();
}

async function handleChampionImport(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  try{
    const text = await file.text();
    const data = JSON.parse(text);

    if(!data || !Array.isArray(data.champions)){
      alert("不正なファイルです");
      return;
    }

    const existing = await getChampionList();

    const toAdd = data.champions.filter(ch => {
      return !existing.some(e => e.name === ch.name && e.image === ch.image);
    });

    await saveManyChampions(toAdd);

    alert(toAdd.length + "件のチャンピオンを追加しました");
    initChampionPage();
  }catch(err){
    console.error(err);
    alert("インポート失敗");
  }
}

</script>
<script>
let pastedImage = null;

async function ensureInitialChampionSeed() {
  const status = document.getElementById("seedStatus");

  try {
    const existing = await getChampionList();
    if (existing.length > 0) {
      if (status) status.style.display = "none";
      return;
    }

    if (status) {
      status.style.display = "block";
      status.textContent = "初期チャンピオンデータを読み込み中...";
    }

    const response = await fetch("champions.json", { cache: "no-store" });
    if (!response.ok) {
      throw new Error("champions.json の読み込みに失敗しました");
    }

    const payload = await response.json();
    if (!payload || !Array.isArray(payload.champions)) {
      throw new Error("champions.json の形式が不正です");
    }

    const champions = payload.champions.map(ch => ({
      ...ch,
      tags: Array.isArray(ch.tags) ? ch.tags : []
    }));

    if (champions.length > 0) {
      await saveManyChampions(champions);
    }

    if (status) {
      status.textContent = `初期チャンピオンを ${champions.length} 件読み込みました。`;
      setTimeout(() => { status.style.display = "none"; }, 1800);
    }
  } catch (error) {
    console.error(error);
    if (status) {
      status.style.display = "block";
      status.textContent = "初期チャンピオンデータの読み込みに失敗しました。必要ならチャンピオンインポートを使ってください。";
    }
  }
}

async function initChampionPage() {
  await ensureInitialChampionSeed();
  await loadChampions();
}

let allChampions = [];
let activeTagFilter = "";
let editingChampionId = null;
let editImage = null;

document.addEventListener("paste", function (e) {
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.indexOf("image") !== -1) {
      const file = item.getAsFile();

      if (document.getElementById("editModal").classList.contains("open")) {
        handleImageFile(file, true);
      } else {
        handleImageFile(file, false);
      }
      return;
    }
  }
});

function handleImageFile(file, isEdit) {
  const reader = new FileReader();
  reader.onload = function (event) {
    compressImage(event.target.result, 220, 0.72).then((compressed) => {
      if (isEdit) {
        editImage = compressed;
        document.getElementById("editPreview").src = compressed;
      } else {
        pastedImage = compressed;
        document.getElementById("preview").src = compressed;
      }
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(src, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function () {
      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > maxSize) {
          height = Math.round(height * (maxSize / width));
          width = maxSize;
        }
      } else {
        if (height > maxSize) {
          width = Math.round(width * (maxSize / height));
          height = maxSize;
        }
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);

      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.src = src;
  });
}

async function saveChampion() {
  const name = document.getElementById("name").value.trim();

  if (!name || !pastedImage) {
    alert("名前と画像を入力してください");
    return;
  }

  try {
    await saveChampionData({
      id: crypto.randomUUID(),
      name: name,
      image: pastedImage,
      tags: []
    });

    document.getElementById("name").value = "";
    document.getElementById("preview").src = "";
    pastedImage = null;

    await initChampionPage();
  } catch (error) {
    console.error(error);
    alert("保存に失敗しました。ブラウザの保存容量を確認してください。");
  }
}

async function loadChampions() {
  allChampions = await getChampionList();

  if (allChampions.length === 0) {
    try {
      const response = await fetch("champions.json", { cache: "no-store" });
      if (response.ok) {
        const payload = await response.json();
        if (payload && Array.isArray(payload.champions)) {
          allChampions = payload.champions.map(ch => ({
            ...ch,
            tags: Array.isArray(ch.tags) ? ch.tags : []
          }));

          if (allChampions.length > 0) {
            try {
              await saveManyChampions(allChampions);
            } catch (e) {
              console.error(e);
            }
          }
        }
      }
    } catch (error) {
      console.error(error);
    }
  }

  renderList();
}

function setTagFilter(tag) {
  activeTagFilter = tag;
  document.querySelectorAll(".tag-filter").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tag === tag);
  });
  renderList();
}

function renderList() {
  const list = document.getElementById("championList");
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  list.innerHTML = "";

  const filtered = allChampions
    .filter(c => c.name.toLowerCase().includes(keyword))
    .filter(c => {
      if (!activeTagFilter) return true;
      return Array.isArray(c.tags) && c.tags.includes(activeTagFilter);
    })
    .sort((a, b) => a.name.localeCompare(b.name, "ja"));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当するチャンピオンがありません。</div>';
    return;
  }

  filtered.forEach(c => {
    const div = document.createElement("div");
    div.className = "champion-card";
    div.innerHTML = `
      <img src="${c.image}" alt="">
      <div class="name">${c.name}</div>
      <div class="card-actions">
        <button class="edit-btn" onclick="openEditModal('${c.id}')">編集</button>
        <button class="delete-btn" onclick="deleteChampion('${c.id}')">削除</button>
      </div>
    `;
    list.appendChild(div);
  });
}

async function deleteChampion(id) {
  if (!confirm("削除しますか？")) return;
  await deleteChampionData(id);
  await initChampionPage();
}

async function openEditModal(id) {
  const champion = await getChampionById(id);
  if (!champion) return;

  editingChampionId = id;
  editImage = champion.image;

  document.getElementById("editName").value = champion.name || "";
  document.getElementById("editPreview").src = champion.image || "";

  const tagSet = new Set(Array.isArray(champion.tags) ? champion.tags : []);
  document.querySelectorAll(".tag-checkbox").forEach(box => {
    box.checked = tagSet.has(box.value);
  });

  document.getElementById("editModal").classList.add("open");
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("open");
  editingChampionId = null;
  editImage = null;
}

async function saveEditChampion() {
  if (!editingChampionId) return;

  const current = await getChampionById(editingChampionId);
  if (!current) return;

  const tags = Array.from(document.querySelectorAll(".tag-checkbox:checked")).map(el => el.value);

  const updated = {
    ...current,
    name: document.getElementById("editName").value.trim(),
    image: editImage || current.image,
    tags: tags
  };

  if (!updated.name) {
    alert("チャンピオン名を入力してください");
    return;
  }

  await saveChampionData(updated);
  closeEditModal();
  await initChampionPage();
}

initChampionPage();

function exportChampions() {
  getChampionList().then(list => {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      champions: list
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.download = "champions.json";
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  });
}

function triggerChampionImport(){
  const input = document.getElementById("championImportInput");
  input.value="";
  input.click();
}

async function handleChampionImport(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  try{
    const text = await file.text();
    const data = JSON.parse(text);

    if(!data || !Array.isArray(data.champions)){
      alert("不正なファイルです");
      return;
    }

    const existing = await getChampionList();

    const toAdd = data.champions.filter(ch => {
      return !existing.some(e => e.name === ch.name && e.image === ch.image);
    });

    await saveManyChampions(toAdd);

    alert(toAdd.length + "件のチャンピオンを追加しました");
    initChampionPage();
  }catch(err){
    console.error(err);
    alert("インポート失敗");
  }
}

</script>

</body>
</html>
